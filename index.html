<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Verhindert automatisches Hineinzoomen auf Handys bei der Eingabe -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile Search & Indexer</title>
    <style>
        :root {
            --bg-color: #f1f3f4;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --border: #dadce0;
            --accent-bg: #f1f3f4;
            --accent-text: #1a73e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Verhindert unschöne blaue Markierungen beim Tippen auf Handys */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .search-container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--card-bg); 
            padding: 24px 16px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
        }

        .header { 
            text-align: center; 
            margin-bottom: 24px; 
        }

        .header h1 { 
            font-size: 24px; 
            font-weight: 700; 
            margin: 0 0 6px 0; 
            color: var(--primary); 
        }

        .header p {
            color: var(--text-sub);
            margin: 0;
            font-size: 13px;
        }

        /* Touch-optimierte Suchbox */
        .search-box { 
            display: flex; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 4px 4px 4px 16px; 
            align-items: center; 
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        /* 16px Schriftgröße verhindert, dass iOS/Safari automatisch zoomt */
        input[type="text"] { 
            flex: 1; 
            border: none; 
            outline: none; 
            font-size: 16px; 
            background: transparent; 
            color: var(--text-main);
            padding: 12px 0; /* Größeres Tipp-Feld für Finger */
        }

        /* Großer Touch-Button */
        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 24px; 
            padding: 12px 24px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.15s ease;
            min-height: 44px; /* Apple/Google Mindestgröße für Touch */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { 
            background-color: var(--primary-hover); 
        }

        .loader { 
            display: none; 
            text-align: center; 
            margin: 24px 0; 
            color: var(--text-sub); 
            font-style: italic; 
            font-size: 14px;
        }

        .section-title { 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            color: var(--text-sub); 
            margin: 24px 0 12px 4px; 
        }

        /* Karten-Layouts für einfache Touchscreen-Bedienung */
        .definition-card { 
            background-color: var(--accent-bg); 
            color: var(--text-main); 
            padding: 16px; 
            border-radius: 14px; 
            line-height: 1.5; 
            font-size: 15px;
        }

        .results-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .result-card { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
        }

        /* Große, leicht tippbare Links für mobile Browser */
        .result-card a { 
            color: var(--primary); 
            font-size: 17px; 
            text-decoration: none; 
            font-weight: 600; 
            display: block;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .result-card .url { 
            color: #006621; 
            font-size: 12px; 
            display: block; 
            margin-bottom: 6px; 
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-card p { 
            margin: 0; 
            color: var(--text-sub); 
            font-size: 13px; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="header">
        <h1>AI Mobile Search</h1>
        <p>Live-Ergebnisse über Ihren Render-Server geladen</p>
    </div>
    
    <!-- inputmode="search" erzwingt die Lupe/Suchen-Taste auf der Handy-Tastatur -->
    <div class="search-box">
        <input type="text" id="suchEingabe" placeholder="Internet durchsuchen..." autocomplete="off" inputmode="search" enterkeyhint="search">
        <button onclick="starteWebSuche()">Suchen</button>
    </div>

    <div id="loader" class="loader">Suche läuft live... Bitte warten...</div>
    <div id="ausgabeBereich"></div>
</div>

<script>
async function starteWebSuche() {
    const eingabeFeld = document.getElementById("suchEingabe");
    const begriff = eingabeFeld.value.trim();
    const ausgabe = document.getElementById("ausgabeBereich");
    const loader = document.getElementById("loader");

    if (begriff === "") return;
    
    // Handy-Tastatur nach dem Klick automatisch einklappen
    eingabeFeld.blur();
    
    ausgabe.innerHTML = "";
    loader.style.display = "block";

    try {
        const baseUrl = window.location.origin;

        // Anfrage an Ihr Render-Backend
        const antwort = await fetch(`${baseUrl}/api/search?q=${encodeURIComponent(begriff)}`);
        if (!antwort.ok) throw new Error("Server-Fehler beim Laden.");
        
        const daten = await antwort.json();
        loader.style.display = "none";

        if (daten.error) {
            ausgabe.innerHTML = `<p style="color:red; font-weight:bold; padding:10px;">Fehler: ${daten.error}</p>`;
            return;
        }

        let html = `
            <div class="section-title">💡 Bedeutung / Erklärung</div>
            <div class="definition-card">${daten.definition}</div>
            <div class="section-title">🌐 Web-Ergebnisse</div>
            <div class="results-list">
        `;

        if (!daten.links || daten.links.length === 0) {
            html += `<p style="color: var(--text-sub); padding:10px;">Keine Web-Links gefunden.</p>`;
        } else {
            daten.links.forEach(item => {
                html += `
                    <div class="result-card">
                        <a href="${item.url}" target="_blank">${item.titel}</a>
                        <span class="url">${item.url}</span>
                        <p>${item.text}</p>
                    </div>
                `;
            });
        }

        html += `</div>`;
        ausgabe.innerHTML = html;

    } catch (fehler) {
        loader.style.display = "none";
        ausgabe.innerHTML = `<p style="color:red; font-weight:bold; padding:10px;">Verbindungsfehler: ${fehler.message}</p>`;
    }
}

// Fängt die "Suchen"-Taste auf der mobilen Handy-Tastatur ab
document.getElementById("suchEingabe").addEventListener("keypress", function(e) {
    if (e.key === "Enter" || e.keyCode === 13) {
        starteWebSuche();
    }
});

// Automatischer Fokus: Aktiviert das Textfeld sofort beim Laden der Seite auf dem Handy
window.onload = function() {
    setTimeout(() => {
        document.getElementById("suchEingabe").focus();
    }, 300);
};
</script>

</body>
</html>
