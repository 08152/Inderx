<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile Search Engine</title>
    <style>
        :root {
            --bg-color: #f1f3f4;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --border: #dadce0;
            --accent-bg: #f1f3f4;
            --accent-text: #1a73e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --safe-color: #137333;
            --safe-bg: #e6f4ea;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .search-container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--card-bg); 
            padding: 24px 16px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
        }

        .header { 
            text-align: center; 
            margin-bottom: 24px; 
        }

        .header h1 { 
            font-size: 24px; 
            font-weight: 700; 
            margin: 0 0 6px 0; 
            color: var(--primary); 
        }

        .header p {
            color: var(--text-sub);
            margin: 0;
            font-size: 13px;
        }

        .status-box {
            background-color: var(--safe-bg);
            color: var(--safe-color);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }

        .search-box { 
            display: flex; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 4px 4px 4px 16px; 
            align-items: center; 
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        input[type="text"] { 
            flex: 1; 
            border: none; 
            outline: none; 
            font-size: 16px; 
            background: transparent; 
            color: var(--text-main);
            padding: 12px 0;
        }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 24px; 
            padding: 12px 24px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.15s ease;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { 
            background-color: var(--primary-hover); 
        }

        .loader { 
            display: none; 
            text-align: center; 
            margin: 24px 0; 
            color: var(--text-sub); 
            font-style: italic; 
            font-size: 14px;
        }

        .section-title { 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            color: var(--text-sub); 
            margin: 24px 0 12px 4px; 
        }

        .definition-card { 
            background-color: var(--accent-bg); 
            color: var(--text-main); 
            padding: 16px; 
            border-radius: 14px; 
            line-height: 1.5; 
            font-size: 15px;
        }

        .results-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .result-card { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
        }

        .result-card a { 
            color: var(--primary); 
            font-size: 17px; 
            text-decoration: none; 
            font-weight: 600; 
            display: block;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .result-card .url { 
            color: #006621; 
            font-size: 12px; 
            display: block; 
            margin-bottom: 6px; 
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-card p { 
            margin: 0; 
            color: var(--text-sub); 
            font-size: 13px; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="header">
        <h1>AI Mobile Search</h1>
        <p>Ergebnisse live laden und dauerhaft im Speicher sichern</p>
    </div>

    <div id="statusMeldung" class="status-box"></div>
    
    <div class="search-box">
        <input type="text" id="suchEingabe" placeholder="Internet durchsuchen..." autocomplete="off" inputmode="search" enterkeyhint="search">
        <button onclick="starteWebSuche()">Suchen</button>
    </div>

    <div id="loader" class="loader">Suche läuft live... Bitte warten...</div>
    <div id="ausgabeBereich"></div>
</div>

<script>
function zeigeStatus(text, istFehler = false) {
    const box = document.getElementById("statusMeldung");
    box.innerText = text;
    box.style.display = "block";
    box.style.backgroundColor = istFehler ? "#fce8e6" : "var(--safe-bg)";
    box.style.color = istFehler ? "#c5221f" : "var(--safe-color)";
    setTimeout(() => { box.style.display = "none"; }, 4000);
}

async function starteWebSuche() {
    const eingabeFeld = document.getElementById("suchEingabe");
    const begriff = eingabeFeld.value.trim().toLowerCase();
    const ausgabe = document.getElementById("ausgabeBereich");
    const loader = document.getElementById("loader");

    if (begriff === "") return;
    
    // Handy-Tastatur einklappen
    eingabeFeld.blur();
    ausgabe.innerHTML = "";

    // 1. SCHRITT: Sicheren Speicher (localStorage) abfragen
    const speicherSchluessel = "mobile_suche_" + begriff;
    const gespeicherteDaten = localStorage.getItem(speicherSchluessel);
    
    if (gespeicherteDaten) {
        const daten = JSON.parse(gespeicherteDaten);
        zeigeStatus("💾 Ergebnisse aus dem sicheren Handy-Speicher geladen!");
        rendereErgebnisse(daten.definition, daten.links, ausgabe);
        return;
    }
    
    // 2. SCHRITT: Live-Suche über das Render-Backend starten
    loader.style.display = "block";

    try {
        const baseUrl = window.location.origin;
        const antwort = await fetch(baseUrl + "/api/search?q=" + encodeURIComponent(begriff));
        
        if (!antwort.ok) throw new Error("Server-Fehler.");
        const daten = await antwort.json();
        
        loader.style.display = "none";

        if (daten.error) {
            ausgabe.innerHTML = "<p style='color:red; font-weight:bold; padding:10px;'>Fehler: " + daten.error + "</p>";
            return;
        }

        // 3. SCHRITT: Daten für die Zukunft sichern (Save)
        const suchPaket = {
            definition: daten.definition,
            links: daten.links
        };
        localStorage.setItem(speicherSchluessel, JSON.stringify(suchPaket));
        zeigeStatus("✅ Erfolgreich im sicheren Speicher gesichert!");

        rendereErgebnisse(daten.definition, daten.links, ausgabe);

    } catch (fehler) {
        loader.style.display = "none";
        ausgabe.innerHTML = "<p style='color:red; font-weight:bold; padding:10px;'>Verbindungsfehler zum Server: " + fehler.message + "</p>";
    }
}

function rendereErgebnisse(definition, links, zielElement) {
    let html = "<div class='section-title'>💡 Bedeutung / Erklärung</div>" +
               "<div class='definition-card'>" + definition + "</div>" +
               "<div class='section-title'>🌐 Web-Ergebnisse</div>" +
               "<div class='results-list'>";

    if (!links || links.length === 0) {
        html += "<p style='color: var(--text-sub); padding:10px;'>Keine Web-Links gefunden.</p>";
    } else {
        links.forEach(function(item) {
            html += "<div class='result-card'>" +
                        "<a href='" + item.url + "' target='_blank'>" + item.titel + "</a>" +
                        "<span class='url'>" + item.url + "</span>" +
                        "<p>" + item.text + "</p>" +
                    "</div>";
        });
    }

    html += "</div>";
    zielElement.innerHTML = html;
}

// Touch-Enter abfangen
document.getElementById("suchEingabe").addEventListener("keypress", function(e) {
    if (e.key === "Enter" || e.keyCode === 13) {
        starteWebSuche();
    }
});

// Automatisch eintippen bereit machen (Fokus auf Handys)
window.onload = function() {
    setTimeout(function() {
        document.getElementById("suchEingabe").focus();
    }, 300);
};
</script>

</body>
</html>
