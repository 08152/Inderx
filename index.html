<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Server Search & Indexer</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #4d5156;
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --border: #dadce0;
            --accent-bg: #e8f0fe;
            --accent-text: #1967d2;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .search-container { width: 100%; max-width: 750px; background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-size: 28px; font-weight: 700; margin: 0 0 10px 0; color: var(--primary); }
        .search-box { display: flex; background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 6px 6px 6px 20px; align-items: center; }
        input[type="text"] { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; }
        button { background-color: var(--primary); color: white; border: none; border-radius: 24px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background-color: var(--primary-hover); }
        .loader { display: none; text-align: center; margin: 30px 0; color: var(--text-sub); font-style: italic; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text-sub); margin: 35px 0 15px 0; }
        .definition-card { background-color: var(--accent-bg); color: var(--accent-text); padding: 20px; border-radius: 16px; line-height: 1.6; }
        .results-list { display: flex; flex-direction: column; gap: 16px; }
        .result-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .result-card a { color: var(--primary); font-size: 18px; text-decoration: none; font-weight: 600; }
        .result-card .url { color: #006621; font-size: 13px; display: block; margin: 4px 0 8px 0; }
        .result-card p { margin: 0; color: var(--text-sub); font-size: 14px; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="header">
        <h1>Render Backend Search</h1>
        <p>Echte Internet-Verzeichnisse direkt über den Server geladen</p>
    </div>
    
    <div class="search-box">
        <input type="text" id="suchEingabe" placeholder="Echtes Internet durchsuchen..." autocomplete="off">
        <button onclick="starteWebSuche()">Suchen</button>
    </div>

    <div id="loader" class="loader">Der Render-Server durchsucht das Web live...</div>
    <div id="ausgabeBereich"></div>
</div>

<script>
async function starteWebSuche() {
    const begriff = document.getElementById("suchEingabe").value.trim();
    const ausgabe = document.getElementById("ausgabeBereich");
    const loader = document.getElementById("loader");

    if (begriff === "") return;
    ausgabe.innerHTML = "";
    loader.style.display = "block";

    try {
        // Erkennt automatisch, ob die App lokal oder live auf Render läuft
        const host = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : window.location.origin;

        // Anfrage an das eigene Render-Backend senden
        const antwort = await fetch(`${host}/api/search?q=${encodeURIComponent(begriff)}`);
        const daten = await antwort.json();
        
        loader.style.display = "none";

        if (daten.error) {
            ausgabe.innerHTML = `<p style="color:red;">Server-Fehler: ${daten.error}</p>`;
            return;
        }

        // HTML zeichnen
        let html = `
            <div class="section-title">💡 Bedeutung / Erklärung</div>
            <div class="definition-card">${daten.definition}</div>
            <div class="section-title">🌐 Web-Ergebnisse (Echte Internet-URLs)</div>
            <div class="results-list">
        `;

        daten.links.forEach(item => {
            html += `
                <div class="result-card">
                    <a href="${item.url}" target="_blank">${item.titel}</a>
                    <span class="url">${item.url}</span>
                    <p>${item.text}</p>
                </div>
            `;
        });

        html += `</div>`;
        ausgabe.innerHTML = html;

    } catch (fehler) {
        loader.style.display = "none";
        ausgabe.innerHTML = `<p style="color:red;">Verbindungsfehler zum Server: ${fehler.message}</p>`;
    }
}

document.getElementById("suchEingabe").addEventListener("keypress", function(e) {
    if (e.key === "Enter") starteWebSuche();
});
</script>

</body>
</html>
